name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  java-core-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-core-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build Java service
        run: mvn -B -DskipTests package

  go-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [go-producer, go-consumer]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: ${{ matrix.service }}/go.sum
      - name: Download dependencies
        run: go mod tidy
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
