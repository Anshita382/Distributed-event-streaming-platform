version: '3.9'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 6
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eventing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./ops/postgres/init:/docker-entrypoint-initdb.d

  java-core-service:
    build:
      context: ./java-core-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_TOPICS_MAIN: events.main
      APP_TOPICS_RETRY: events.retry
      APP_TOPICS_DLQ: events.dlq
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"

  go-consumer:
    build:
      context: ./go-consumer
    environment:
      GO_CONSUMER_KAFKA_BROKERS: kafka:29092
      GO_CONSUMER_GROUP_ID: go-consumer-group
      GO_CONSUMER_MAIN_TOPIC: events.main
      GO_CONSUMER_RETRY_TOPIC: events.retry
      GO_CONSUMER_DLQ_TOPIC: events.dlq
      GO_CONSUMER_REDIS_ADDR: redis:6379
      GO_CONSUMER_POSTGRES_URL: postgres://postgres:postgres@postgres:5432/eventing?sslmode=disable
      GO_CONSUMER_METRICS_ADDR: :2112
      GO_CONSUMER_MAX_RETRIES: 3
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      postgres:
        condition: service_started
    ports:
      - "2112:2112"

  go-producer:
    build:
      context: ./go-producer
    environment:
      GO_PRODUCER_KAFKA_BROKERS: kafka:29092
      GO_PRODUCER_TOPIC: events.main
      GO_PRODUCER_METRICS_ADDR: :2113
      GO_PRODUCER_BURST_SIZE: 500
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "2113:2113"

  prometheus:
    image: prom/prometheus:v2.54.1
    depends_on:
      - java-core-service
      - go-consumer
      - go-producer
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.4
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards
