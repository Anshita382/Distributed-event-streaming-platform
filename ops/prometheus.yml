global:
  scrape_interval: 5s

scrape_configs:
  - job_name: java-core-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: go-consumer
    static_configs:
      - targets: ['host.docker.internal:2112']

  - job_name: go-producer
    static_configs:
      - targets: ['host.docker.internal:2113']
